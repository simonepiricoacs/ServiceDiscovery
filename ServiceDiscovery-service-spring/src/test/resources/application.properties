##### Spring data JPA Configuration ######
#test purpose configuration
spring.datasource.driver-class-name=org.hsqldb.jdbcDriver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.url=jdbc:hsqldb:mem:testdb_servicediscovery_spring
spring.jpa.hibernate.ddl-auto=create-drop
# Disabling auto validation since system apis do it automatically
spring.jpa.properties.javax.persistence.validation.mode=none
##### Spring Web Configuration ######
server.servlet.context-path=/water
#### Water Configuration #####
##water.testMode=false
server.port=8181
water.rest.security.jwt.validate.by.jws=false
water.rest.security.jwt.validate=false
water.testMode=true
